name: Deploy para Discloud

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: discloud-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Discloud
        env:
          DISCLOUD_TOKEN: ${{ secrets.DISCLOUD_TOKEN }}
          DISCLOUD_APP_ID: ${{ vars.DISCLOUD_APP_ID || '1776281039305' }}
        run: npm run deploy
